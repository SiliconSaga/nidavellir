# ESO → OpenBao wiring over the Vault-compatible API.
#
# The ClusterSecretStore authenticates via Kubernetes auth: ESO's controller
# ServiceAccount (external-secrets/external-secrets) is bound to the eso-role
# OpenBao role (eso-read policy, read-only over secret/*). Both the role and
# the KV v2 mount at secret/ are created during the human-gated init flow —
# see the Phase 1a plan, Task A1.5 Step 3.
#
# The demo ExternalSecret materializes secret/demo (seeded at init) into a
# plain Kubernetes Secret as the end-to-end smoke check.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao-kv
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-role"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-from-openbao
  namespace: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-kv
    kind: ClusterSecretStore
  # These target/remoteRef fields are spelled out to match what the live
  # object carries: Kubernetes applies the ESO CRD's OpenAPI schema defaults
  # at admission, so any omitted-but-defaulted field comes back populated and
  # ArgoCD then reports perpetual OutOfSync drift -- same schema-default
  # pattern (and fix) as nordri's Gateway/cert-manager note. nullBytePolicy
  # has no schema default in current ESO, so it is included only for
  # explicitness, not to suppress drift.
  target:
    name: demo-from-openbao
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: foo
      remoteRef:
        key: secret/demo
        property: foo
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
