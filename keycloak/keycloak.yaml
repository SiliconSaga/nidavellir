# The Keycloak instance CR (operator-managed, Keycloak 26.6.3 — field
# names verified against the v2beta1 schema in the vendor mirror,
# components/keycloak-k8s-resources/kubernetes/ at tag 26.6.3;
# v2alpha1 is deprecated there).
#
# DB credentials come straight from the Percona user secret the Mimir
# claim generates (keys `user` + `password` — Crunchy-style secret).
# TLS terminates at the shared traefik-gateway; Keycloak serves plain
# HTTP in-cluster (httpEnabled) and trusts X-Forwarded-* headers from
# the gateway (proxy.headers). Hostname is dynamic (see below): the
# external URL is https://keycloak.cmdbee.org on GKE (wildcard TLS) and
# http://keycloak.localhost on homelab (web listener — route rendered
# by the sso-demo composition).
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
spec:
  instances: 1
  db:
    vendor: postgres
    host: keycloak-postgres
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-postgres-user-secret
      key: user
    passwordSecret:
      name: keycloak-postgres-user-secret
      key: password
  # Hostname-v2 dynamic mode: the issuer follows the request host —
  # https://keycloak.cmdbee.org via the GKE gateway, http://keycloak.localhost
  # via the homelab web listener (the SSO demo's browser path). A pinned
  # hostname would make the issuer unreachable from a homelab browser.
  # Re-pinning per-env is a hardening-phase item alongside TLS.
  hostname:
    strict: false
  http:
    httpEnabled: true
  proxy:
    headers: xforwarded
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
