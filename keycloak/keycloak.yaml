# The Keycloak instance CR (operator-managed, Keycloak 26.6.3 — field
# names verified against the v2beta1 schema in the vendor mirror,
# components/keycloak-k8s-resources/kubernetes/ at tag 26.6.3;
# v2alpha1 is deprecated there).
#
# DB credentials come straight from the Percona user secret the Mimir
# claim generates (keys `user` + `password` — Crunchy-style secret).
# TLS terminates at the shared traefik-gateway; Keycloak serves plain
# HTTP in-cluster (httpEnabled) and trusts X-Forwarded-* headers from
# the gateway (proxy.headers). The hostname is fixed to cmdbee.org on
# both environments so the wildcard cert applies — on homelab, where
# the wildcard cert is currently unissued (DNS01 needs Workload
# Identity), in-cluster access still works and the kuttl smoke probes
# the service directly.
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
spec:
  instances: 1
  db:
    vendor: postgres
    host: keycloak-postgres
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-postgres-user-secret
      key: user
    passwordSecret:
      name: keycloak-postgres-user-secret
      key: password
  hostname:
    hostname: keycloak.cmdbee.org
  http:
    httpEnabled: true
  proxy:
    headers: xforwarded
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
