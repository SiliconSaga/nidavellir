# Bootstrap realm: proves CR-driven realm import + OIDC discovery work.
# The placeholder client gets replaced by the real Backstage confidential
# client later (and Ting later still).
apiVersion: k8s.keycloak.org/v2beta1
kind: KeycloakRealmImport
metadata:
  name: siliconsaga-realm
  namespace: keycloak
spec:
  keycloakCRName: keycloak
  realm:
    realm: siliconsaga
    enabled: true
    displayName: SiliconSaga
    clients:
      # Non-functional placeholder proving realm import + OIDC discovery
      # work; replaced later by the real Backstage confidential client. An
      # explicit callback path (no wildcard) keeps even this throwaway from
      # being an open-redirect target.
      - clientId: placeholder
        name: "Placeholder (replaced when Backstage/Ting arrive)"
        enabled: true
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: true
        redirectUris:
          - "https://placeholder.cmdbee.org/oauth2/callback"
