# Shared Traefik Gateway resource — owned by Vegvísir.
#
# Nordri installs the Traefik Helm chart (registering GatewayClass: traefik) with
# gateway.enabled=false so it does not auto-create a Gateway. This resource owns
# that responsibility, co-located here with cert-manager and ClusterIssuers.
#
# Creates the LoadBalancer on GKE. Retrieve the external IP after sync:
#   kubectl get svc traefik -n kube-system -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
#
# Prerequisites:
#   - Gateway API CRDs installed
#   - Traefik deployed by Nordri (GatewayClass traefik must exist)
#
# Sync-wave 13: after the traefik-gateway-default-cert secret is created (wave 12),
# so the websecure listener's certificateRef resolves immediately and the Gateway
# becomes Programmed on first apply. The LB IP is unaffected — it comes from the
# Traefik Helm service created at bootstrap, not from this Gateway resource.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-gateway
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  gatewayClassName: traefik
  listeners:
  - name: web
    port: 8000
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  - name: websecure
    port: 8443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      # SINGLE certificateRef — a wildcard cert for the cluster domain.
      #
      # Why exactly one: Traefik's Gateway API provider does NOT reliably
      # SNI-iterate across multiple certificateRefs on one listener — it
      # uses the first and serves the default cert for everything else
      # (Traefik issue #11972, open/unfixed; reproduced here on 3.6.5 and
      # 3.7.1). The previous per-host pattern (one Secret + ReferenceGrant
      # per app) silently broke every host past the first. See
      # SiliconSaga/yggdrasil#65 for the full investigation.
      #
      # A wildcard *.<domain> cert is ONE cert covering every host, so the
      # broken selection path is never reached. The Secret lives in this
      # Gateway's own namespace (kube-system) — no ReferenceGrant needed.
      # Issued by the letsencrypt-dns01 ClusterIssuer via cert-manager's
      # Cloud DNS solver; see wildcard-cert.yaml.
      certificateRefs:
      - group: ""
        kind: Secret
        name: wildcard-cmdbee-tls
        namespace: kube-system
