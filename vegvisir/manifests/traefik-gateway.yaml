# Shared Traefik Gateway resource — owned by Vegvísir.
#
# Nordri installs the Traefik Helm chart (registering GatewayClass: traefik) with
# gateway.enabled=false so it does not auto-create a Gateway. This resource owns
# that responsibility, co-located here with cert-manager and ClusterIssuers.
#
# Creates the LoadBalancer on GKE. Retrieve the external IP after sync:
#   kubectl get svc traefik -n kube-system -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
#
# Prerequisites:
#   - Gateway API CRDs installed
#   - Traefik deployed by Nordri (GatewayClass traefik must exist)
#
# Sync-wave 5: before cert-manager (wave 10) and ClusterIssuers (wave 15).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-gateway
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  gatewayClassName: traefik
  listeners:
  - name: web
    port: 8000
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  - name: websecure
    port: 8443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        # Created by cert-manager once the first Certificate using letsencrypt-gateway
        # is issued. Traefik falls back to a self-signed cert until this secret exists.
        name: traefik-gateway-default-cert
        namespace: kube-system
