# Shared Traefik Gateway resource — owned by Vegvísir.
#
# Nordri installs the Traefik Helm chart (registering GatewayClass: traefik) with
# gateway.enabled=false so it does not auto-create a Gateway. This resource owns
# that responsibility, co-located here with cert-manager and ClusterIssuers.
#
# Creates the LoadBalancer on GKE. Retrieve the external IP after sync:
#   kubectl get svc traefik -n kube-system -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
#
# Prerequisites:
#   - Gateway API CRDs installed
#   - Traefik deployed by Nordri (GatewayClass traefik must exist)
#
# Sync-wave 13: after the traefik-gateway-default-cert secret is created (wave 12),
# so the websecure listener's certificateRef resolves immediately and the Gateway
# becomes Programmed on first apply. The LB IP is unaffected — it comes from the
# Traefik Helm service created at bootstrap, not from this Gateway resource.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-gateway
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  gatewayClassName: traefik
  listeners:
  - name: web
    port: 8000
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  - name: websecure
    port: 8443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      # Traefik's Gateway API provider does SNI matching across the
      # certificateRefs list: the cert whose CN/SAN matches the SNI request
      # is served; the self-signed bootstrap cert is the fallback for
      # unmatched hostnames. The matching cert must come BEFORE the
      # fallback in this list.
      #
      # Per-app secrets must live in their app namespace and grant
      # cross-namespace read via a `ReferenceGrant` (see e.g.
      # components/ting/k8s/overlays/cmdbee/referencegrant.yaml).
      #
      # TODO: this static list doesn't scale. The "Vegvísir Operator —
      # TBD" mentioned in vegvisir/README.md is the planned mechanism to
      # watch Certificate resources and patch this list automatically.
      # Until that lands, each new HTTPS host needs an entry added here
      # plus a matching ReferenceGrant in its namespace.
      certificateRefs:
      - group: ""
        kind: Secret
        name: ting-tls
        namespace: ting
      - group: ""
        kind: Secret
        name: gitea-tls
        namespace: gitea
      - group: ""
        kind: Secret
        # Created at wave 12 by traefik-default-cert.yaml (self-signed bootstrap cert).
        # Fallback cert; the list is ordered, so this must stay last.
        name: traefik-gateway-default-cert
        namespace: kube-system
