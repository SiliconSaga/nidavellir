apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Vegvísir base — resources deployed on EVERY cluster (homelab + GKE).
#
# Sync-wave ordering:
#   wave 10: cert-manager-app.yaml      — cert-manager Helm app
#   wave 11: selfsigned-issuer.yaml     — bootstrap SelfSigned ClusterIssuer
#   wave 12: traefik-default-cert.yaml  — self-signed cert creates the gateway secret
#   wave 13: traefik-gateway.yaml       — Gateway (secret now exists, listeners valid)
#
# Environment-specific resources (LetsEncrypt issuers + the *.cmdbee.org wildcard
# cert, which need public DNS + a Cloud DNS solver) live in overlays/gke only.
# The homelab overlay keeps the Gateway on the self-signed default cert so its
# websecure listener programs without a public CA — see overlays/homelab.
resources:
  - cert-manager-app.yaml
  - selfsigned-issuer.yaml
  - traefik-default-cert.yaml
  - traefik-gateway.yaml
