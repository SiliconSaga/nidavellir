# ClusterIssuer for domains pointing at the Traefik Gateway LoadBalancer IP.
#
# Uses cert-manager's gatewayHTTPRoute HTTP-01 solver. When a Certificate
# referencing this issuer is created, cert-manager temporarily creates an HTTPRoute
# that routes the ACME challenge through the Traefik Gateway's port-80 listener.
#
# Use this issuer for cmdbee.org (and any future domains pointing at the Traefik LB).
# The existing letsencrypt-prod issuer (nginx) continues to serve siliconsaga.org.
#
# Prerequisites:
#   - Gateway API CRDs installed
#   - traefik-gateway Gateway resource applied (wave 5)
#   - cert-manager installed and healthy (wave 10)
#
# Sync-wave 15: after cert-manager is ready.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  acme:
    email: siliconsaga@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-gateway-account-key
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
          - name: traefik-gateway
            namespace: kube-system
            kind: Gateway
