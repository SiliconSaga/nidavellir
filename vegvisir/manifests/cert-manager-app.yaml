# ArgoCD Application for cert-manager.
#
# Apply on FRESH CLUSTER SETUP ONLY. Skip this if cert-manager is already installed
# (e.g. existing GKE cluster with a pre-existing cert-manager deployment).
#
# Sync-wave 10 ensures cert-manager is healthy before ClusterIssuers (wave 15) are applied.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://charts.jetstack.io'
    chart: cert-manager
    targetRevision: v1.19.0
    helm:
      values: |
        installCRDs: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
