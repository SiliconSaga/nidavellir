apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Default resources: Gateway + ClusterIssuer.
# These are applied on all clusters (existing or fresh).
#
# cert-manager-app.yaml is intentionally excluded here.
# Apply it separately on fresh clusters that don't have cert-manager pre-installed:
#   kubectl apply -f vegvisir/manifests/cert-manager-app.yaml
#
resources:
  - traefik-gateway.yaml
  - letsencrypt-gateway-issuer.yaml
