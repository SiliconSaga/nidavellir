---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-whoami
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: demo-whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: demo-whoami
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: whoami
---
# HTTPRoute — validates Gateway attachment.
# Wave 16: after Gateway is Programmed (wave 13).
#
# No per-host Certificate: the platform serves a wildcard *.cmdbee.org cert
# from the shared Gateway. To put this demo on HTTPS, add a `websecure`
# parentRef alongside `web` — TLS is then automatic, no cert resource needed.
# See docs/wildcard-tls.md.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami-http
  namespace: demo-whoami
  annotations:
    argocd.argoproj.io/sync-wave: "16"
spec:
  parentRefs:
  - name: traefik-gateway
    namespace: kube-system
    kind: Gateway
    sectionName: web
  hostnames:
  - "test.cmdbee.org"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "/"
    backendRefs:
    - name: whoami
      port: 80
