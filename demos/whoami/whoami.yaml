---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-whoami
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: demo-whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: demo-whoami
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: whoami
---
# Staging certificate for the test hostname.
# Uses letsencrypt-gateway-staging — validates the HTTP-01 challenge pipeline
# without consuming Let's Encrypt production rate limits.
# Replace the hostname with your actual domain before applying.
# Wave 16: after all Vegvísir platform resources (issuers at wave 15).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: whoami-cert
  namespace: demo-whoami
  annotations:
    argocd.argoproj.io/sync-wave: "16"
spec:
  secretName: whoami-tls
  privateKey:
    rotationPolicy: Always
  issuerRef:
    name: letsencrypt-gateway-staging
    kind: ClusterIssuer
  dnsNames:
  - test.cmdbee.org
---
# HTTP route — validates Gateway attachment and plain HTTP traffic.
# Wave 16: after Gateway is Programmed (wave 13).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami-http
  namespace: demo-whoami
  annotations:
    argocd.argoproj.io/sync-wave: "16"
spec:
  parentRefs:
  - name: traefik-gateway
    namespace: kube-system
    kind: Gateway
    sectionName: web   # attach to HTTP listener only
  hostnames:
  - "test.cmdbee.org"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "/"
    backendRefs:
    - name: whoami
      port: 80
