apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xharbor
  labels:
    provider: harbor
spec:
  mode: Pipeline
  compositeTypeRef:
    apiVersion: nidavellir.siliconsaga.org/v1alpha1
    kind: XHarbor
  pipeline:

  # ──────────────────────────────────────────────────────────
  # Step 0: Load cluster identity (EnvironmentConfig → context).
  # Provides storageClass + domain per environment (homelab/gke),
  # plus harborRole/harborCentral driving the proxy-cache split
  # (Step 4: central binds origins, local chains to central).
  # ──────────────────────────────────────────────────────────
  - step: load-cluster-identity
    functionRef:
      name: function-environment-configs
    input:
      apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
      kind: Input
      spec:
        environmentConfigs:
        - type: Reference
          ref:
            name: cluster-identity

  # ──────────────────────────────────────────────────────────
  # Step 0.5: Explicit harbor Namespace, ahead of the namespaced
  # Objects below (Postgres claim, HTTPRoute, proxy-cache
  # ConfigMap/Job), so they don't race Helm's own namespace
  # creation on a fresh cluster.
  # ──────────────────────────────────────────────────────────
  - step: deploy-namespace
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: kubernetes.crossplane.io/v1alpha2
          kind: Object
          metadata:
            name: {{ .observed.composite.resource.metadata.name }}-harbor-namespace
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: harbor-namespace
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: harbor

  # ──────────────────────────────────────────────────────────
  # Step 1: Harbor's Postgres — a Mimir PostgreSQLInstance claim,
  # same vending pattern as keycloak/postgres-claim.yaml. Percona's
  # composition yields a ClusterIP Service harbor-postgres:5432 and
  # the user secret harbor-postgres-user-secret (keys user/password).
  # Wrapped in a provider-kubernetes Object like the HTTPRoute below,
  # since it's a claim (CRD-backed), not a provider-helm/-kubernetes
  # managed resource itself.
  # ──────────────────────────────────────────────────────────
  - step: deploy-postgres
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: kubernetes.crossplane.io/v1alpha2
          kind: Object
          metadata:
            name: {{ .observed.composite.resource.metadata.name }}-harbor-postgres
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: harbor-postgres
          spec:
            forProvider:
              manifest:
                apiVersion: database.example.org/v1alpha1
                kind: PostgreSQLInstance
                metadata:
                  name: harbor-postgres
                  namespace: harbor
                spec:
                  parameters:
                    storageSize: 5Gi
                    version: "15"
                    replicas: 1
                    databaseName: harbor
                  compositionSelector:
                    matchLabels:
                      provider: percona
                      service: postgresql

  # ──────────────────────────────────────────────────────────
  # Step 2: Harbor Helm Release — public-read pull-through cache.
  # Values are a templated copy of eitri/harbor/values.yaml:
  # externalURL and every PVC storageClass come from cluster
  # identity, the registry PVC size from the XR parameters.
  # Postgres is vended from Mimir (external DB, above) — redis
  # stays chart-bundled for now (valkey-vending is a later task).
  # ──────────────────────────────────────────────────────────
  - step: deploy-harbor
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $identity := index .context "apiextensions.crossplane.io/environment" -}}
          {{- $storageClass := $identity.storageClass -}}
          {{- $domain := $identity.domain -}}
          {{- $params := .observed.composite.resource.spec.parameters -}}
          {{- $version := $params.chartVersion | default "1.16.0" -}}
          {{- $registrySize := $params.registrySize | default "100Gi" -}}
          apiVersion: helm.crossplane.io/v1beta1
          kind: Release
          metadata:
            name: {{ .observed.composite.resource.metadata.name }}-harbor
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: harbor-release
          spec:
            forProvider:
              chart:
                name: harbor
                repository: https://helm.goharbor.io
                version: "{{ $version }}"
              namespace: harbor
              values:
                fullnameOverride: harbor
                expose:
                  type: clusterIP
                  tls:
                    enabled: false
                  clusterIP:
                    name: harbor
                    ports:
                      httpPort: 80
                externalURL: https://harbor.{{ $domain }}
                persistence:
                  enabled: true
                  resourcePolicy: "keep"
                  persistentVolumeClaim:
                    registry:
                      storageClass: {{ $storageClass }}
                      accessMode: ReadWriteOnce
                      size: {{ $registrySize }}
                    jobservice:
                      jobLog:
                        storageClass: {{ $storageClass }}
                        accessMode: ReadWriteOnce
                        size: 5Gi
                    redis:
                      storageClass: {{ $storageClass }}
                      size: 5Gi
                database:
                  type: external
                  external:
                    host: harbor-postgres
                    port: "5432"
                    username: harbor
                    coreDatabase: harbor
                    existingSecret: harbor-postgres-user-secret
                trivy:
                  enabled: false
                notary:
                  enabled: false
                metrics:
                  enabled: false

  # ──────────────────────────────────────────────────────────
  # Step 3: HTTPRoute via provider-kubernetes Object. TLS comes
  # free from the wildcard cert on the Gateway's websecure
  # listener (vegvisir); host resolves per-env via $domain.
  # ──────────────────────────────────────────────────────────
  - step: deploy-ingress
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $identity := index .context "apiextensions.crossplane.io/environment" -}}
          {{- $domain := $identity.domain -}}
          apiVersion: kubernetes.crossplane.io/v1alpha2
          kind: Object
          metadata:
            name: {{ .observed.composite.resource.metadata.name }}-harbor-route
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: harbor-route
          spec:
            forProvider:
              manifest:
                apiVersion: gateway.networking.k8s.io/v1
                kind: HTTPRoute
                metadata:
                  name: harbor
                  namespace: harbor
                spec:
                  parentRefs:
                    - group: gateway.networking.k8s.io
                      name: traefik-gateway
                      namespace: kube-system
                      kind: Gateway
                      sectionName: websecure
                  hostnames:
                    - "harbor.{{ $domain }}"
                  rules:
                    - matches:
                        - path:
                            type: PathPrefix
                            value: /
                      backendRefs:
                        - group: ""
                          kind: Service
                          name: harbor
                          port: 80
                          weight: 1

  # ──────────────────────────────────────────────────────────
  # Step 4: Role-driven proxy-cache setup. A post-install Job runs
  # the same registry+project bootstrap as the standalone
  # eitri/harbor/setup-proxy-cache.sh (POST /api/v2.0/registries,
  # then a public proxy-cache /api/v2.0/projects bound to it; 2xx
  # or 409 = success). The embedded script below is that logic
  # verbatim, with two adaptations for running in-cluster: BASE
  # defaults to the in-cluster Service (http://harbor, matching
  # expose.tls.enabled=false above) instead of externalURL, and
  # the mirror list comes from $MIRRORS (env), so the ONLY thing
  # that varies by role is which registries populate $MIRRORS:
  #   central: the five true origins (xpkg.crossplane.io,
  #     xpkg.upbound.io, quay.io, ghcr.io, and Docker Hub via
  #     Harbor's docker-hub adapter, whose required endpoint URL
  #     is https://hub.docker.com — not docker.io directly).
  #   local: the SAME five project names, all bound to the
  #     central Harbor (https://{{ $identity.harborCentral }})
  #     via the generic docker-registry adapter, chaining
  #     local → central → origin. Central resolves the forwarded
  #     path under its own identically-named project, so no
  #     per-project path rewriting is needed here.
  # Ordering: this Job must run AFTER Harbor's API is serving
  # (see the composition's flagged live concerns) — Phase 1 only
  # proves the render picks the right registry list per role.
  # ──────────────────────────────────────────────────────────
  - step: setup-proxy-cache
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $identity := index .context "apiextensions.crossplane.io/environment" -}}
          {{- $role := $identity.harborRole -}}
          {{- $central := $identity.harborCentral -}}
          {{- $name := .observed.composite.resource.metadata.name -}}
          apiVersion: kubernetes.crossplane.io/v1alpha2
          kind: Object
          metadata:
            name: {{ $name }}-proxy-cache-script
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: proxy-cache-script
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: harbor-proxy-cache-script
                  namespace: harbor
                data:
                  setup-proxy-cache.sh: |
                    #!/usr/bin/env bash
                    # Configure Harbor's public-read proxy-cache projects (idempotent).
                    # In-cluster copy of eitri/harbor/setup-proxy-cache.sh's API logic:
                    # BASE targets the Service instead of externalURL, and the mirror
                    # list is read from $MIRRORS (env, injected per-role by the
                    # composition) instead of a literal here-string.
                    set -uo pipefail
                    command -v jq >/dev/null 2>&1 || { echo "setup-proxy-cache.sh requires jq on PATH." >&2; exit 1; }
                    BASE="${HARBOR_URL:-http://harbor}"
                    U="admin"; P="${HARBOR_ADMIN_PW:?set HARBOR_ADMIN_PW}"
                    api() {
                      local u="${U//\\/\\\\}"; u="${u//\"/\\\"}"
                      local p="${P//\\/\\\\}"; p="${p//\"/\\\"}"
                      curl -sS -H "Content-Type: application/json" -K - "$@" <<EOF
                    user = "$u:$p"
                    EOF
                    }
                    fails=0
                    ok() { case "$1" in 2*|409) return 0 ;; *) return 1 ;; esac; }
                    while read -r name type url; do
                      [ -z "$name" ] && continue
                      code="$(api -X POST "$BASE/api/v2.0/registries" \
                        -d "{\"name\":\"$name\",\"type\":\"$type\",\"url\":\"$url\",\"insecure\":false}" \
                        -o /dev/null -w "%{http_code}")"
                      echo "registry $name -> $url : $code"
                      ok "$code" || { echo "  ! unexpected status for registry '$name': $code" >&2; fails=$((fails + 1)); }
                      rid="$(api "$BASE/api/v2.0/registries?q=name%3D$name" | jq -r '.[0].id')"
                      if [ -z "$rid" ] || [ "$rid" = "null" ]; then
                        echo "  ! could not resolve registry id for '$name' — skipping project" >&2
                        fails=$((fails + 1))
                        continue
                      fi
                      code="$(api -X POST "$BASE/api/v2.0/projects" \
                        -d "{\"project_name\":\"$name\",\"registry_id\":$rid,\"metadata\":{\"public\":\"true\"}}" \
                        -o /dev/null -w "%{http_code}")"
                      echo "project  $name (public proxy-cache) : $code"
                      ok "$code" || { echo "  ! unexpected status for project '$name': $code" >&2; fails=$((fails + 1)); }
                    done <<< "$MIRRORS"
                    if [ "$fails" -ne 0 ]; then
                      echo "$fails Harbor API call(s) returned an unexpected status." >&2
                      exit 1
                    fi
          ---
          apiVersion: kubernetes.crossplane.io/v1alpha2
          kind: Object
          metadata:
            name: {{ $name }}-proxy-cache-job
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: proxy-cache-job
          spec:
            forProvider:
              manifest:
                apiVersion: batch/v1
                kind: Job
                metadata:
                  name: harbor-proxy-cache-setup
                  namespace: harbor
                spec:
                  backoffLimit: 3
                  template:
                    spec:
                      restartPolicy: Never
                      containers:
                        - name: proxy-cache-setup
                          image: alpine:3.20
                          command: ["sh", "-c"]
                          args:
                            - apk add --no-cache bash curl jq >/dev/null && bash /scripts/setup-proxy-cache.sh
                          env:
                            - name: HARBOR_ADMIN_PW
                              valueFrom:
                                secretKeyRef:
                                  name: harbor-core
                                  key: HARBOR_ADMIN_PASSWORD
                            - name: MIRRORS
                              value: |
                                {{- if eq $role "central" }}
                                crossplane docker-registry https://xpkg.crossplane.io
                                upbound docker-registry https://xpkg.upbound.io
                                quay docker-registry https://quay.io
                                ghcr docker-registry https://ghcr.io
                                dockerhub docker-hub https://hub.docker.com
                                {{- else }}
                                crossplane docker-registry https://{{ $central }}
                                upbound docker-registry https://{{ $central }}
                                quay docker-registry https://{{ $central }}
                                ghcr docker-registry https://{{ $central }}
                                dockerhub docker-registry https://{{ $central }}
                                {{- end }}
                          volumeMounts:
                            - name: script
                              mountPath: /scripts
                      volumes:
                        - name: script
                          configMap:
                            name: harbor-proxy-cache-script

  # ──────────────────────────────────────────────────────────
  # Step 5: Auto-ready
  # ──────────────────────────────────────────────────────────
  - step: auto-ready
    functionRef:
      name: function-auto-ready
