# Materializes the Harbor admin password into the `harbor-admin` Secret that
# the composition's Release (`existingSecretAdminPassword`) and the proxy-cache
# Job (`HARBOR_ADMIN_PW`) both read. Born in OpenBao, never in git.
#
# One-time seed (operator, at/after OpenBao init — see nidavellir
# docs/secrets-management.md "Put a value in"):
#
#   ROOT_TOKEN=$(kubectl get secret openbao-init -n openbao -o jsonpath='{.data.root_token}' | base64 -d)
#   kubectl exec -n openbao openbao-0 -- env BAO_TOKEN="$ROOT_TOKEN" \
#     bao kv put secret/harbor HARBOR_ADMIN_PASSWORD=<generated-strong-password>
#
# Until seeded, this ExternalSecret reports SecretSyncedError and the Harbor
# Release + proxy-cache Job stay Not Ready — that is the expected gate, not a
# failure. The target/remoteRef fields are spelled out to match what the live
# object carries (the Kubernetes API server applies the ESO CRD's OpenAPI schema
# defaults at admission; omitting them
# makes ArgoCD report perpetual OutOfSync drift — same pattern as the demo
# ExternalSecret in openbao/secretstore.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-admin
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-kv          # the cluster-scoped store — works from any namespace
    kind: ClusterSecretStore
  target:
    name: harbor-admin        # the Secret the chart + proxy-cache Job consume
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: HARBOR_ADMIN_PASSWORD
      remoteRef:
        key: secret/harbor
        property: HARBOR_ADMIN_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
