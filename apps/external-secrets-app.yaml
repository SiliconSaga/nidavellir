# ArgoCD Application for the External Secrets Operator (Leiðangr Phase 1a).
#
# Direct Helm chart — env-agnostic (no PVC, no hostname), so no Crossplane
# composition needed. ESO reconciles ExternalSecrets against OpenBao through
# the Vault-compatible API; the ClusterSecretStore wiring lives in the
# openbao/ directory (openbao ArgoCD app) so store + backend ship together.
#
# Sync-wave 9: before openbao (wave 10) so the ClusterSecretStore CRD exists
# when the openbao app applies openbao/secretstore.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "9"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "2.6.0"
    helm:
      values: |
        installCRDs: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
