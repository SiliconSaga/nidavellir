# ArgoCD Application for the Keycloak instance.
#
# Syncs keycloak/ — the Mimir Postgres claim, the Keycloak CR, the
# siliconsaga realm import, and the HTTPRoute. Sync-wave 12: after the
# operator app (wave 8) so the CRDs + controller exist first;
# SkipDryRunOnMissingResource covers the first-sync race where the CRDs
# are still establishing.
#
# Expected bring-up order: Postgres claim goes Ready first; the Keycloak
# pod crash-loops until its DB is reachable — that's provisioning, not
# failure.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "12"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'http://gitea-http.gitea.svc.cluster.local:3000/nordri-admin/nidavellir.git'
    targetRevision: HEAD
    path: keycloak
    directory:
      recurse: false   # explicit (matches the operator app); keycloak/ is flat
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
