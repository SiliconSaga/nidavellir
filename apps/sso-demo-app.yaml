# ArgoCD Application for the SSO demo (Leiðangr Phase 1 capstone).
#
# One SSODemo claim that exercises the whole substrate at once:
# cluster-identity, a composition, OpenBao, ESO, Keycloak, and Gateway
# API. oauth2-proxy + whoami do real OIDC against the disposable `demo`
# realm; the client secret and demo-user password are born in OpenBao
# and reach both sides of the handshake via ESO. Walkthrough + seeding:
# sso-demo/README.md. Retire the demo by removing this app from
# apps/kustomization.yaml.
#
# Sync-wave 14: after keycloak (12). Expected resting state before
# secret/sso-demo is seeded in OpenBao: ExternalSecrets not Ready and
# the realm-import job pending — converges on seeding, by design.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sso-demo
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "14"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'http://gitea-http.gitea.svc.cluster.local:3000/nordri-admin/nidavellir.git'
    targetRevision: HEAD
    path: sso-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: sso-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
