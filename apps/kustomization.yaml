apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Nidavellir app-of-apps: ArgoCD Applications for all platform components.
# ArgoCD scans this directory via the nidavellir-apps Application in Nordri.
#
# Add a new Application here when onboarding a new platform component.
# Each Application should use the internal Gitea URL during bootstrap;
# swap to GitHub per the transition procedure in vegvisir/README.md.
resources:
  - vegvisir-app.yaml
  - mimir-app.yaml
  - heimdall-app.yaml
  - tailscale-operator-app.yaml
  - ntfy-app.yaml
  - external-secrets-app.yaml
  - openbao-app.yaml
  - keycloak-operator-app.yaml
  - keycloak-app.yaml
  # vordu-app.yaml       # TODO: add when Vörðu has K8s manifests
  # demicracy-apps.yaml  # TODO: uncomment when Demicracy repo has apps/ dir

# Demos are NOT auto-deployed — they are ad-hoc, like demos/whoami. Apply a
# demo's manifests directly when you want it (e.g. `kubectl apply -f demos/sso`),
# never the app file: this app-of-apps prunes+selfHeals, so a manually applied
# Application not listed here would just be pruned again. See each demo's README:
#   demos/cluster-identity/  (apps/cluster-identity-demo-app.yaml)
#   demos/sso/               (apps/sso-demo-app.yaml)
