# ArgoCD Application for the cluster-identity demo (substrate smoke test).
#
# Deploys an XRD + Composition + sample Claim that exercises the
# cluster-identity pattern end-to-end via function-environment-configs.
# See demos/cluster-identity/README.md for what it validates and how to test.
#
# Sync-wave 16: after Vegvísir issuers (wave 15) so the staging ClusterIssuer
# exists when the rendered Certificate is applied.
#
# Source: during bootstrap ArgoCD pulls from internal Gitea. After the cluster
# is stable, swap repoURL to GitHub and add an ArgoCD repository credential Secret.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-identity-demo
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "16"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'http://gitea-http.gitea.svc.cluster.local:3000/nordri-admin/nidavellir.git'
    targetRevision: HEAD
    path: demos/cluster-identity
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-cluster-identity
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
