# Offline-render stand-in for the GKE cluster-identity EnvironmentConfig
# (in-cluster it's applied by nordri layer4-fundamentals). Swap this in for
# the homelab file via --extra-resources to verify the GKE-side rendering:
# storageClass standard-rwo, HTTPRoute host openbao.cmdbee.org.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: cluster-identity
data:
  domain: cmdbee.org
  environment: gke
  storageClass: standard-rwo
