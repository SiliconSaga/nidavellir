apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      set -e
      # App-side wiring: an unauthenticated /oauth2/start must 302 into
      # the demo realm's authorization endpoint. Together with 02-token
      # this covers both halves of the handshake browserlessly.
      kubectl delete pod sso-redirect-probe -n $NAMESPACE --ignore-not-found
      kubectl wait --for=delete pod/sso-redirect-probe -n $NAMESPACE --timeout=60s 2>/dev/null || true
      kubectl run sso-redirect-probe --restart=Never --image=curlimages/curl:8.10.1 -n $NAMESPACE -- \
        sh -c 'for i in $(seq 1 12); do
          LOC=$(curl -s -o /dev/null -w "%{redirect_url}" http://oauth2-proxy.sso-demo.svc:4180/oauth2/start)
          echo "redirect: $LOC"
          echo "$LOC" | grep -q "/realms/demo/protocol/openid-connect/auth" && exit 0
          sleep 5
        done; exit 1'
      RESULT=1
      for i in $(seq 1 60); do
        PHASE=$(kubectl get pod sso-redirect-probe -n $NAMESPACE -o jsonpath='{.status.phase}' 2>/dev/null)
        if [ "$PHASE" = "Succeeded" ]; then RESULT=0; break; fi
        if [ "$PHASE" = "Failed" ]; then break; fi
        sleep 2
      done
      if [ "$RESULT" -ne 0 ]; then
        kubectl logs sso-redirect-probe -n $NAMESPACE >&2 || true
      fi
      kubectl delete pod sso-redirect-probe -n $NAMESPACE --ignore-not-found
      exit $RESULT
