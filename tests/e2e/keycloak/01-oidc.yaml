apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      # In-cluster OIDC discovery probe against the operator-created
      # service — no external DNS/TLS dependency, so it runs on homelab
      # where the wildcard cert is unissued. A 200 with an
      # authorization_endpoint proves the GENERIC platform Keycloak is
      # serving OIDC discovery. Probes the built-in `master` realm so this
      # stays realm-agnostic — realm/app-specific realm imports are
      # realm-injected (nidavellir#20) and must be asserted realm-side, not
      # here.
      #
      # No --rm: kubectl would delete the pod on command exit and the
      # phase poll below would never see it. Create, poll, dump logs on
      # failure, delete explicitly. One-shot pods report status.phase,
      # never a Ready condition (kuttl skill). Pre-clean any leftover
      # probe from an interrupted prior run AND wait for it to be gone —
      # `kubectl delete` returns before the pod is actually removed, so
      # without the wait a rerun can hit AlreadyExists on a Terminating pod.
      kubectl delete pod kc-oidc-probe -n $NAMESPACE --ignore-not-found
      kubectl wait --for=delete pod/kc-oidc-probe -n $NAMESPACE --timeout=60s 2>/dev/null || true
      kubectl run kc-oidc-probe --restart=Never --image=curlimages/curl:8.10.1 -n $NAMESPACE -- \
        sh -c 'for i in $(seq 1 30); do
          curl -fsS http://keycloak-service.keycloak.svc:8080/realms/master/.well-known/openid-configuration | grep -q authorization_endpoint && exit 0
          sleep 5
        done; exit 1'
      RESULT=1
      for i in $(seq 1 60); do
        PHASE=$(kubectl get pod kc-oidc-probe -n $NAMESPACE -o jsonpath='{.status.phase}' 2>/dev/null)
        if [ "$PHASE" = "Succeeded" ]; then RESULT=0; break; fi
        if [ "$PHASE" = "Failed" ]; then break; fi
        sleep 2
      done
      if [ "$RESULT" -ne 0 ]; then
        kubectl logs kc-oidc-probe -n $NAMESPACE >&2 || true
      fi
      kubectl delete pod kc-oidc-probe -n $NAMESPACE --ignore-not-found
      exit $RESULT
